name: Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: js

      - name: Generate client
        run: npm run codegen
        working-directory: js

      - name: Typecheck
        run: npm run typecheck
        working-directory: js

      - name: Lint
        run: npm run lint
        working-directory: js

      - name: Build
        run: npm run build
        working-directory: js

  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and type tools
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[test]"
        working-directory: python

      - name: Generate client
        run: python scripts/codegen.py
        working-directory: python

      - name: Typecheck
        run: |
          python -m pyright
          python -m mypy
        working-directory: python

      - name: Lint
        run: flake8 dcn scripts tests
        working-directory: python
