name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript package version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          expected="${TAG#v}"
          actual="$(node -p "require('./js/package.json').version")"

          if [ "$actual" != "$expected" ]; then
            echo "::error title=JavaScript package version mismatch::Release tag $TAG expects js/package.json version $expected, but found $actual. Run: cd js && npm version $expected --no-git-tag-version, then commit js/package.json and js/package-lock.json before tagging."
            exit 1
          fi

  javascript:
    name: JavaScript package
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: js

      - name: Check package
        run: |
          npm run codegen
          npm run typecheck
          npm run lint
          npm test
        working-directory: js

      - name: Build package
        run: |
          npm run prepack
          mkdir -p ../build/npm
          npm pack --pack-destination ../build/npm
          cp ../build/npm/dcn-*.tgz ../build/npm/dcn-js-sdk.tgz
        working-directory: js

      - name: Upload JavaScript package
        uses: actions/upload-artifact@v4
        with:
          name: js-package
          path: build/npm/*.tgz

  python:
    name: Python distribution
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install -U pip
          python -m pip install build hatchling hatch-vcs
          python -m pip install -e ".[test]"
        working-directory: python

      - name: Check package
        run: |
          python -m pyright
          python -m mypy
          flake8 dcn scripts tests
          python -m unittest discover -s tests -p 'test_*.py' -v
        working-directory: python

      - name: Build Python distribution
        run: |
          python -m build --sdist --wheel
          cp dist/dcn-*.tar.gz dist/dcn-python-sdk.tar.gz
          ls -l dist
        working-directory: python

      - name: Upload Python distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - javascript
      - python
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: build/release
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/release/* --clobber
          else
            gh release create "$TAG" build/release/* --title "$TAG" --generate-notes --verify-tag
          fi
